services:
  postgres:
    image: postgres:16
    container_name: amx-postgres
    environment:
      POSTGRES_DB: SAP
      POSTGRES_USER: amx
      POSTGRES_PASSWORD: amx_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./dataset:/data

volumes:
  pgdata:
